name: Build and Deploy GPAS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Deploy on Production Server
      run: |
        SERVER_USER=${{ secrets.SERVER_USER }}
        SERVER_IP=${{ secrets.SERVER_IP }}
        ENV_FILE="${{ secrets.ENV_FILE_PROD }}"
        PROJECT_DIR="/home/$SERVER_USER/gpas"

        # Ensure app directory exists
        ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
          mkdir -p $PROJECT_DIR
        "

        # Copy environment file
        printf '%s' "$ENV_FILE" | ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "cat > $PROJECT_DIR/.env"

        # Copy project code (excluding node_modules and .git)
        rsync -avz --exclude '.git' --exclude 'node_modules' -e "ssh -o StrictHostKeyChecking=no" ./ $SERVER_USER@$SERVER_IP:$PROJECT_DIR

        # Build and run Docker containers via docker compose on the server
        ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "
          set -e
          cd $PROJECT_DIR

          # Build and run containers
          sudo docker compose up -d --build

          # Optional cleanup
          sudo docker container prune -f
          sudo docker image prune -af --filter 'until=12h'
        "
